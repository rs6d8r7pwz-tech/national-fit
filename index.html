<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo192.png" />
    <link rel="icon" type="image/png" href="/logo512.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/logo192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="/logo512.png" sizes="512x512" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- App metadata -->
    <title>NATIONAL FIT — Coach Sportif IA Personnel</title>
    <meta name="title" content="NATIONAL FIT — Coach Sportif IA" />
    <meta name="description" content="Programmes d'entraînement personnalisés, plans alimentaires et coach virtuel 24/7. Transformez votre corps avec l'IA." />
    
    <!-- SEO -->
    <meta name="keywords" content="fitness, musculation, nutrition, coach sportif, IA, entraînement, régime, santé" />
    <meta name="author" content="Brochier Bastien" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NATIONAL FIT — Coach Sportif IA" />
    <meta property="og:description" content="Transformez votre corps avec un coach IA personnalisé" />
    <meta property="og:url" content="https://nationalfit.app" />
    <meta property="og:image" content="/logo512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NATIONAL FIT — Coach Sportif IA" />
    <meta name="twitter:description" content="Transformez votre corps avec un coach IA personnalisé" />
    <meta name="twitter:image" content="/logo512.png" />

    <!-- Security headers via meta -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()" />
    <meta name="robots" content="index, follow" />

    <!-- PWA / Mobile app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NATIONAL FIT" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="NATIONAL FIT" />
    
    <!-- Theme colors -->
    <meta name="theme-color" content="#1e50dc" />
    <meta name="msapplication-TileColor" content="#1e50dc" />
    
    <!-- Disable autocomplete -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />
    
    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
